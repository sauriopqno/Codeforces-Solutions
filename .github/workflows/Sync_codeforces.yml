name: Sync Codeforces Submissions

on:
  schedule:
    - cron: '0 */6 * * *' # Se ejecuta cada 6 horas
  workflow_dispatch:      # Permite ejecución manual

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso explícito para escribir en tu repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          CF_HANDLE: 'imanol-e-p' 
        run: python .github/scripts/sync.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "auto: sync codeforces submissions"
            git push
          else
            echo "No hay nuevas entregas para subir."
          fi
          
